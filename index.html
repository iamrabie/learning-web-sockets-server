<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Socket.IO chat</title>
    <style>
      body { margin: 0; padding-bottom: 3rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

      #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
      #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
      #input:focus { outline: none; }
      #form > button { background: #333; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; outline: none; color: #fff; }

      #messages { list-style-type: none; margin: 0; padding: 0; }
      #messages > li { padding: 0.5rem 1rem; }
      #messages > li:nth-child(odd) { background: #efefef; }
    </style>
  </head>
  <body>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" />
      <button onclick="handleClick(event)">Send</button>
      <button onclick="handleJoinRoom1(event)">Join Room 1</button>
      <button onclick="handleJoinRoom2(event)">Join Room 2</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();

      const form = document.getElementById('form');
      const input = document.getElementById('input');
      const messages = document.getElementById('messages');


      // socket.on('hi'  , (socket) => {
      //    console.log("a new user joinedd");
      // });


      socket.on('chat message', (msg) => {
        const item = document.createElement('li');
        item.textContent = msg;
        messages.appendChild(item);
        window.scrollTo(0, document.body.scrollHeight);
      });


      function handleJoinRoom1 (event) {
        event.preventDefault();
 
        console.log("input value ROOM 1 :::::" , input.value);

        if (input.value) {
          socket.emit("room1" , "room-1" , input.value);
          // socket.emit('chat message' , input.value);
          input.value = '';
        }

      }

      function handleJoinRoom2 (event) {
        event.preventDefault();     
        console.log("input value ROOM 1 :::::" , input.value);

        if (input.value) {
          socket.emit("room2" , "room-2" , input.value);
          input.value = '';
        }


      }



      //HANDLE SEND MESSAGE
      function handleClick (event) {
        event.preventDefault();
        // console.log("e target value :::::::::" , input.value);

        //input.value just give T or F, if "" or no value then F else T
        if (input.value) {
          // console.log("input value :::::" , input.value);
          //emit means send from where i am
          socket.emit('chat message' , input.value);
          input.value = '';

          //added acknowledgement:
          //DEFINITION: Acknowledgement in Socket.IO is a callback function passed with emit() that runs when the server responds back after receiving the event,
          //It is a way to get a response from the server after sending an event.
          // socket.emit('acknowledgement' , 'rabia' , (err , res) => {
          //   if (err) {
          //     console.log("error sending the data to the server.");
          //   }
          //   else {
          //     console.log("response recieved" , res);
          //   }
          // });
        } 
      }

      

    </script>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Socket.IO chat</title>
    <style>
       form {
        width:15%;
        border:1px solid black;
        /* border-radius:6px; */
        margin-left: auto;
        margin-right: auto;
        display:flex;
        flex-direction: column;
        row-gap: 5px;
        padding:15px 9px;
       }

       input {
        width:100%;
        padding:6px 3px;
        border:0px;
        border-bottom: 1px solid black;
        outline:none;
       }

       button {
         padding:9px 3px;
         font-weight: 600;
         background-color: rgb(27, 27, 137);
         color:white;
         border:0px;
         border-radius: 3px;
       }

       ul {
        /* border:1px solid blue; */
        padding:10px 5px;
       }

       li {
        list-style-type: none;
        padding:7px;
        border:1px;
        font-size: 18px;
        background-color: rgb(18, 115, 163);
        margin-bottom: 3px;
        border-radius: 4px;
        color:white;
       }

       .main-container {
        height:100vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
       }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="join-container">
          <form>
             <input type="text" placeholder="Enter username" id="input" />
             <button onclick="handleClick(event)">JOIN ROOM 1</button>
          </form>
          <ul id="global"></ul>
          <ul id="messages"></ul>
          <div id="user-joined"></div>
       </div>
       <div>
          <div id="acknowledgement"></div>
          <div id="typing"></div>
          <input type="text" placeholder="Enter message" id="text-message" oninput="handleInputValue(event)" />
          <button onclick="handleSendMessage(event)">SEND</button>
       </div>
    </div>

       <script src="/socket.io/socket.io.js"></script>
        <script>
            const input = document.getElementById("input");
            const messages = document.getElementById("messages");
            const textMessage = document.getElementById("text-message");
            const typing = document.getElementById("typing"); 
            const userJoined = document.getElementById("user-joined");
            const acknowledgement = document.getElementById("acknowledgement");
            const globalAnnouncement = document.getElementById("global");
            let typingTimer;

            const socket = io();

            socket.on("global-announcement" , (announcement) => {
                const item = document.createElement("li");
                item.textContent = announcement;
                globalAnnouncement.appendChild(item);
            }); 

        
            socket.on("notify-all" , (user) => {
                console.log("..." , user , "JOINED!");
                const item = document.createElement("p");
                item.textContent = user + " " + "joined!";
                userJoined.appendChild(item);
                // window.scrollTo(0, document.body.scrollHeight);
            });


            socket.on("room-chat" , (message) => {
                console.log("room chat :::::::::" , message);
                const item = document.createElement("li");
                item.textContent = message;
                messages.appendChild(item);
                window.scrollTo(0, document.body.scrollHeight);
            });


            socket.on("typing" , (isTyping) => {
                // console.log("client side typing listener");
                typing.textContent = isTyping;
            });


            socket.on("stop-typing", (stopTyping) => {
                typing.textContent = " ";
            });

            const handleInputValue = (event) => {
                console.log("user input" , event.target.value);
                clearTimeout(typingTimer);

                if (event.target.value) {
                    // console.log("TYPING TRIGGERED FROM CLIENT SIDE");
                    console.log("IF BLOCK::::::::::::::::::");
                    socket.emit("typing", "is typing");
                    typingTimer = setTimeout(() => {
                        socket.emit("stop-typing");
                    } , 500);
                }

                else {
                    // console.log("ELSE BLOCK ::::::::::::::");
                    socket.emit("stop-typing");
                }
            }


            const handleClick = (event) => {
                event.preventDefault();
                // console.log("handle click function triggered.");

                if (input.value) {
                    // console.log("user entered :::" , input.value);
                    socket.emit("join-room" , input.value);
                    input.value = '';
                }
            }


            const handleSendMessage = (event) => {
                event.preventDefault();

                if (textMessage.value) {
                    // console.log("text value" , textMessage.value);
                    socket.emit("send-message" , textMessage.value , (res) => {
                    console.log("RESPONSE " , res);
                    const item = document.createElement("p");
                    item.textContent = res;
                    acknowledgement.appendChild(item);
                });

                    textMessage.value = '';
                }
            }


        </script>
  </body>
</html>

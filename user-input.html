<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Socket.IO chat</title>
    <style>
      body { margin: 0; padding-bottom: 3rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

      #form { background: rgba(0, 0, 0, 0.15); margin-top: 20px; margin-left: auto; margin-right: auto; width:30%; box-sizing: border-box; backdrop-filter: blur(10px); }
      #input { border: none; padding:10px; border-radius: 2rem; margin: 0.25rem; width:330px }
      #input:focus { outline: none; }
      #form > button { background: #333; border: none; padding: 10px; margin: 0.25rem; border-radius: 3px; outline: none; color: #fff; }

      #messages { list-style-type: none; margin: 0; padding: 0; }
      #messages > li { padding: 0.5rem 1rem; }
      #messages > li:nth-child(odd) { background: #efefef; }
    </style>
  </head>
  <body>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" placeholder="Enter username" />
      <button onclick="{handleSendMessage(event)}">JOIN</button>
      <!-- <button onclick="handleClick(event)">Send</button>
      <button onclick="handleJoinRoom1(event)">Join Room 1</button>
      <button onclick="handleJoinRoom2(event)">Join Room 2</button> -->
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const messages = document.getElementById("messages");
        const form = document.getElementById('form');
        const input = document.getElementById('input');
     
        const handleSendMessage = (event) => {

            event.preventDefault();

            console.log("function triggered");

            socket.emit("send-message" , input.value); 

        }

    </script>
  </body>
</html>

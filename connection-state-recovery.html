<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Socket.IO chat</title>
    <style>
      body { margin: 0; padding-bottom: 3rem; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

      #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
      #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
      #input:focus { outline: none; }
      #form > button { background: #333; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; outline: none; color: #fff; }

      #messages { list-style-type: none; margin: 0; padding: 0; }
      #messages > li { padding: 0.5rem 1rem; }
      #messages > li:nth-child(odd) { background: #efefef; }
    </style>
  </head>
  <body>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" />
      <button onclick="handleSendMessage(event)">Send</button>
      <button onclick="handleIsConnected(event)" id="btn">Connect</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>

        const socket = io();

        let isConnected = false;

        let input = document.getElementById("input");
        let messages = document.getElementById("messages");


        socket.on("messages" , (message) => {
            console.log("CLIENT SIDE MESSAGE RECIEVED::::" , message);

            const item = document.createElement("li");
            item.textContent = message;
            messages.appendChild(item);
        })


        const handleIsConnected = (event) => {
            console.log("is connected??" , isConnected);
            event.preventDefault();
            let Button = document.getElementById("btn");
            // console.log("BUTTON" , Button);


            if (isConnected) {
                Button.innerHTML = "Disconnect";
                isConnected = false;
                socket.disconnect();
            } else {
                Button.innerHTML = "Connect";
                isConnected = true;
                socket.connect();
            }

        }


        

        const handleSendMessage = (event) => {
            event.preventDefault();
            console.log("event triggered :::::::" , input.value);

            if (input.value) {
                socket.emit("send-message" , input.value);
            } else {
               console.log("please type something first");
            }
        }

    </script>
  </body>
</html>
